name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Receipts check (no quality coefficients)
        run: make receipts-check

      - name: Unit tests
        run: make test

      - name: Battery (grade-A gate)
        run: make battery
