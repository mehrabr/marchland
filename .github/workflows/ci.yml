name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      matrix:
        # Off-pin leg (2.5.0rc1): surfaces stream changes; allowed to fail.
        # Use rc1 (the newest real release) until 2.5.0 final ships.
        numpy-version: ["2.4.6", "2.5.0rc1"]
      fail-fast: false

    # Off-pin leg is allowed to fail — it exists to surface stream changes, not block merges.
    continue-on-error: ${{ matrix.numpy-version != '2.4.6' }}

    steps:
      - uses: actions/checkout@v4

      # Model A (Ren'Py 8.5.3 bundled interpreter): pin to 3.12.
      # If GOLDEN_HASH / CHAIN_GOLDEN_HASH fail here, regenerate under cp312
      # using the commands in tests/test_reproducibility.py and commit updated hashes.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e . "numpy==${{ matrix.numpy-version }}"

      - name: Receipts check (no quality coefficients)
        run: make receipts-check

      - name: Reproducibility gate (seed-0 stochastic golden hash)
        run: pytest tests/test_reproducibility.py -v

      - name: Unit tests
        run: make test

      - name: Battery (grade-A gate)
        run: make battery
